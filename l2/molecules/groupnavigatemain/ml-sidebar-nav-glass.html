<!-- Fundo rico = contrato de container do glassmorphism. -->
<div style="min-height:100vh; padding:2rem; background:linear-gradient(135deg,#0b1220 0%,#312e81 45%,#7e22ce 100%); background-attachment:fixed;">
  <div style="max-width:64rem; margin:0 auto; font-family:'Inter',system-ui,sans-serif;">
    <header style="text-align:center; margin-bottom:2rem;">
      <h1 style="font-size:1.875rem; font-weight:600; color:#fff; margin-bottom:0.5rem;">Sidebar Nav</h1>
      <span style="display:inline-block; padding:0.25rem 0.75rem; background:rgba(255,255,255,0.15); color:#fff; border:1px solid rgba(255,255,255,0.25); border-radius:9999px; font-size:0.875rem;">groupNavigateMain · glassmorphism · herança</span>
    </header>

    <aura--molecules--playground--widget-playground-state-102020 state='{"playground":{"nav":{"value":"dashboard","collapsed":false}}}'></aura--molecules--playground--widget-playground-state-102020>

    <div style="height:30rem; border-radius:18px; overflow:hidden; border:1px solid rgba(255,255,255,0.15); display:flex;">
      <groupnavigatemain--ml-sidebar-nav-glass value="{{playground.nav.value}}" collapsed="{{playground.nav.collapsed}}">
        <Label>Aurora</Label>
        <Item value="dashboard" icon="▦">Dashboard</Item>
        <Item value="projects" icon="▤" badge="3">Projetos</Item>
        <Group label="Workspace">
          <Item value="tasks" icon="✓">Tarefas</Item>
          <Item value="calendar" icon="▣">Calendário</Item>
          <Item value="reports" icon="◔" disabled>Relatórios</Item>
        </Group>
        <Footer>
          <Item value="settings" icon="⚙">Configurações</Item>
          <Item value="logout" icon="⎋">Sair</Item>
        </Footer>
      </groupnavigatemain--ml-sidebar-nav-glass>
      <div style="flex:1; padding:1.5rem; color:rgba(255,255,255,0.85); background:rgba(255,255,255,0.04);">
        <details style="margin-bottom:1rem;">
          <summary style="cursor:pointer; font-size:0.875rem; color:rgba(255,255,255,0.7);">Controles</summary>
          <div style="margin-top:0.5rem; padding:1rem; border:1px solid rgba(255,255,255,0.15); border-radius:0.5rem;">
            <aura--molecules--playground--widget-playground-state-boolean-102020 label="collapsed" value="{{playground.nav.collapsed}}"></aura--molecules--playground--widget-playground-state-boolean-102020>
          </div>
        </details>
        Conteúdo da página ao lado da sidebar.
      </div>
    </div>
  </div>
</div>
