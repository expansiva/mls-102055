<!-- Fundo rico = contrato de container do glassmorphism (o scrim do modal o desfoca). -->
<div style="min-height:100vh; padding:2rem; background:linear-gradient(135deg,#0b1220 0%,#312e81 45%,#7e22ce 100%); background-attachment:fixed;">
  <div style="max-width:48rem; margin:0 auto; font-family:'Inter',system-ui,sans-serif;">
    <header style="text-align:center; margin-bottom:2rem;">
      <h1 style="font-size:1.875rem; font-weight:600; color:#fff; margin-bottom:0.5rem;">Alert Modal</h1>
      <span style="display:inline-block; padding:0.25rem 0.75rem; background:rgba(255,255,255,0.15); color:#fff; border:1px solid rgba(255,255,255,0.25); border-radius:9999px; font-size:0.875rem;">groupNotifyUser · glassmorphism</span>
    </header>

    <aura--molecules--playground--widget-playground-state-102020 state='{"playground":{"info":{"visible":true},"error":{"visible":false}}}'></aura--molecules--playground--widget-playground-state-102020>

    <article style="background:rgba(255,255,255,0.07); backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px); border:1px solid rgba(255,255,255,0.15); border-radius:16px; padding:1.5rem; color:#fff;">
      <p style="margin-bottom:1rem; color:rgba(255,255,255,0.8); font-size:0.875rem;">Use os toggles abaixo para abrir/fechar os modais. O scrim desfoca este fundo.</p>
      <details open>
        <summary style="cursor:pointer; font-size:0.875rem; color:rgba(255,255,255,0.7);">Controles</summary>
        <div style="margin-top:0.5rem; padding:1rem; border:1px solid rgba(255,255,255,0.15); border-radius:0.5rem;">
          <aura--molecules--playground--widget-playground-state-boolean-102020 label="info.visible" value="{{playground.info.visible}}"></aura--molecules--playground--widget-playground-state-boolean-102020>
          <aura--molecules--playground--widget-playground-state-boolean-102020 label="error.visible" value="{{playground.error.visible}}"></aura--molecules--playground--widget-playground-state-boolean-102020>
        </div>
      </details>
    </article>

    <groupnotifyuser--ml-alert-modal-glass type="info" visible="{{playground.info.visible}}">
      <Title>Confirmar ação</Title>
      <Message>Deseja realmente continuar? Esta ação pode ser desfeita mais tarde.</Message>
      <Action>
        <grouptriggeraction--ml-button-standard data-variant="ghost"><Label>Cancelar</Label></grouptriggeraction--ml-button-standard>
        <grouptriggeraction--ml-button-standard data-variant="primary"><Label>Confirmar</Label></grouptriggeraction--ml-button-standard>
      </Action>
    </groupnotifyuser--ml-alert-modal-glass>

    <groupnotifyuser--ml-alert-modal-glass type="error" visible="{{playground.error.visible}}">
      <Title>Excluir item</Title>
      <Message>Esta ação é permanente e não pode ser desfeita.</Message>
      <Action>
        <grouptriggeraction--ml-button-standard data-variant="ghost"><Label>Cancelar</Label></grouptriggeraction--ml-button-standard>
        <grouptriggeraction--ml-button-standard data-variant="danger"><Label>Excluir</Label></grouptriggeraction--ml-button-standard>
      </Action>
    </groupnotifyuser--ml-alert-modal-glass>
  </div>
</div>
