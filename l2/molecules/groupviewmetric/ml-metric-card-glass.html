<!-- Fundo rico = contrato de container do glassmorphism. -->
<div style="min-height:100vh; padding:2rem; background:linear-gradient(135deg,#0b1220 0%,#312e81 45%,#7e22ce 100%); background-attachment:fixed;">
  <div style="max-width:42rem; margin:0 auto; font-family:'Inter',system-ui,sans-serif;">
    <header style="text-align:center; margin-bottom:3rem;">
      <h1 style="font-size:1.875rem; font-weight:600; color:#fff; margin-bottom:0.5rem;">Metric Card</h1>
      <span style="display:inline-block; padding:0.25rem 0.75rem; background:rgba(255,255,255,0.15); color:#fff; border:1px solid rgba(255,255,255,0.25); border-radius:9999px; font-size:0.875rem;">groupViewMetric · glassmorphism · 102055 (herança)</span>
    </header>

    <section style="display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:1.5rem;">
      <groupviewmetric--ml-metric-card-glass>
        <Icon>📈</Icon>
        <Label>Receita mensal</Label>
        <Value>R$ 128.430</Value>
        <Trend direction="up">+12,5%</Trend>
        <Helper>vs. mês anterior</Helper>
      </groupviewmetric--ml-metric-card-glass>

      <groupviewmetric--ml-metric-card-glass>
        <Icon>👥</Icon>
        <Label>Churn</Label>
        <Value>3,2%</Value>
        <Trend direction="down">-0,8%</Trend>
        <Helper>últimos 30 dias</Helper>
      </groupviewmetric--ml-metric-card-glass>
    </section>
  </div>
</div>
