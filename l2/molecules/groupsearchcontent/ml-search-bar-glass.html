<!-- Fundo rico = contrato de container do glassmorphism. -->
<div style="min-height:100vh; padding:2rem; background:linear-gradient(135deg,#0b1220 0%,#312e81 45%,#7e22ce 100%); background-attachment:fixed;">
  <div style="max-width:32rem; margin:0 auto; font-family:'Inter',system-ui,sans-serif;">
    <header style="text-align:center; margin-bottom:3rem;">
      <h1 style="font-size:1.875rem; font-weight:600; color:#fff; margin-bottom:0.5rem;">Search Bar</h1>
      <span style="display:inline-block; padding:0.25rem 0.75rem; background:rgba(255,255,255,0.15); color:#fff; border:1px solid rgba(255,255,255,0.25); border-radius:9999px; font-size:0.875rem;">groupSearchContent · glassmorphism (inheritance)</span>
    </header>

    <widget-playground-state-102020 state='{"playground":{"q":{"value":null}}}'></widget-playground-state-102020>

    <article style="background:rgba(255,255,255,0.07); backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px); border:1px solid rgba(255,255,255,0.15); border-radius:16px; padding:1.5rem;">
      <groupsearchcontent--ml-search-bar-glass value="{{playground.q.value}}">
        <Label>Buscar</Label>
        <Helper>Digite para ver sugestões</Helper>
        <Suggestion value="lit">Lit</Suggestion>
        <Suggestion value="ts">TypeScript</Suggestion>
        <Suggestion value="less">LESS</Suggestion>
        <Suggestion value="glass">Glassmorphism</Suggestion>
      </groupsearchcontent--ml-search-bar-glass>
    </article>
  </div>
</div>
