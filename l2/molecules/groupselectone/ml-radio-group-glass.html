<!-- Fundo rico = contrato de container do glassmorphism. -->
<div style="min-height:100vh; padding:2rem; background:linear-gradient(135deg,#0b1220 0%,#312e81 45%,#7e22ce 100%); background-attachment:fixed;">
  <div style="max-width:64rem; margin:0 auto; font-family:'Inter',system-ui,sans-serif;">
    <header style="text-align:center; margin-bottom:3rem;">
      <h1 style="font-size:1.875rem; font-weight:600; color:#fff; margin-bottom:0.5rem;">Radio Group</h1>
      <span style="display:inline-block; padding:0.25rem 0.75rem; background:rgba(255,255,255,0.15); color:#fff; border:1px solid rgba(255,255,255,0.25); border-radius:9999px; font-size:0.875rem;">groupSelectOne · glassmorphism</span>
    </header>

    <aura--molecules--playground--widget-playground-state-102020 state='{"playground":{"basic":{"value":"standard"},"groups":{"value":""},"error":{"value":"","error":"Selecione um plano"},"disabled":{"value":"pro"},"viewmode":{"value":"standard"}}}'></aura--molecules--playground--widget-playground-state-102020>

    <section style="display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:1.5rem; margin-bottom:2rem;">

      <article style="background:rgba(255,255,255,0.07); backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px); border:1px solid rgba(255,255,255,0.15); border-radius:16px; padding:1.5rem;">
        <h3 style="font-size:1.125rem; font-weight:600; color:#fff; margin-bottom:1rem;">Basic</h3>
        <demo id="demo-basic">
          <groupselectone--ml-radio-group-glass value="{{playground.basic.value}}">
            <Label>Plano</Label>
            <Helper>Escolha um plano</Helper>
            <Item value="free">Gratuito</Item>
            <Item value="standard">Standard</Item>
            <Item value="pro">Pro</Item>
            <Item value="enterprise" disabled>Enterprise (sob consulta)</Item>
          </groupselectone--ml-radio-group-glass>
        </demo>
      </article>

      <article style="background:rgba(255,255,255,0.07); backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px); border:1px solid rgba(255,255,255,0.15); border-radius:16px; padding:1.5rem;">
        <h3 style="font-size:1.125rem; font-weight:600; color:#fff; margin-bottom:1rem;">Com grupos</h3>
        <demo id="demo-groups">
          <groupselectone--ml-radio-group-glass value="{{playground.groups.value}}">
            <Label>Entrega</Label>
            <Group label="Padrão">
              <Item value="eco">Econômica (7 dias)</Item>
              <Item value="normal">Normal (3 dias)</Item>
            </Group>
            <Group label="Expressa">
              <Item value="fast">Rápida (1 dia)</Item>
              <Item value="same">No mesmo dia</Item>
            </Group>
          </groupselectone--ml-radio-group-glass>
        </demo>
      </article>

      <article style="background:rgba(255,255,255,0.07); backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px); border:1px solid rgba(255,255,255,0.15); border-radius:16px; padding:1.5rem;">
        <h3 style="font-size:1.125rem; font-weight:600; color:#fff; margin-bottom:1rem;">Erro (required)</h3>
        <demo id="demo-error">
          <groupselectone--ml-radio-group-glass value="{{playground.error.value}}" error="{{playground.error.error}}" required="true">
            <Label>Plano</Label>
            <Item value="free">Gratuito</Item>
            <Item value="pro">Pro</Item>
          </groupselectone--ml-radio-group-glass>
        </demo>
      </article>

      <article style="background:rgba(255,255,255,0.07); backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px); border:1px solid rgba(255,255,255,0.15); border-radius:16px; padding:1.5rem;">
        <h3 style="font-size:1.125rem; font-weight:600; color:#fff; margin-bottom:1rem;">Disabled / View</h3>
        <demo id="demo-disabled">
          <groupselectone--ml-radio-group-glass value="{{playground.disabled.value}}" disabled="true">
            <Label>Plano</Label>
            <Item value="free">Gratuito</Item>
            <Item value="pro">Pro</Item>
          </groupselectone--ml-radio-group-glass>
        </demo>
        <div style="margin-top:1rem;">
          <groupselectone--ml-radio-group-glass value="{{playground.viewmode.value}}" is-editing="false">
            <Label>Plano (view)</Label>
            <Item value="standard">Standard</Item>
          </groupselectone--ml-radio-group-glass>
        </div>
      </article>

    </section>
  </div>
</div>
